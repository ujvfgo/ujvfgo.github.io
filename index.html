<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的精神世界</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: #ccc;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        h1 {
            font-size: 48px;
            color: #8b0000;
            letter-spacing: 4px;
            animation: flicker 3s infinite;
        }

        p {
            margin-top: 20px;
            color: #888;
        }

        button {
            margin-top: 40px;
            padding: 10px 30px;
            background: transparent;
            border: 1px solid #8b0000;
            color: #8b0000;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #8b0000;
            color: black;
        }

        @keyframes flicker {
            0% {opacity: 1;}
            50% {opacity: 0.4;}
            100% {opacity: 1;}
        }

        .hidden {
            display: none;
        }

        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            padding-top: 100px;
            text-align: center;
        }

        .card {
            margin: 20px auto;
            width: 300px;
            padding: 20px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #8b0000;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container" id="entry">
    <h1>我的精神世界</h1>
    <p>你确定要进入吗？</p >
    <button onclick="enterWorld()">进入</button>
</div>

<div class="content hidden" id="main">
    <h1>欢迎</h1>

    <div class="card">
        <h3>关于我</h3>
        <p>一个正在构建世界的人</p >
    </div>

    <div class="card">
        <h3>我的项目</h3>
        <p>2D魂类游戏开发中</p >
    </div>

    <div class="card">
        <h3>我的想法</h3>
        <p>这里记录一些混乱的思考</p >
        <a href="no1.html">进入</a>
    </div>
</div>

<script>
function enterWorld() {
    document.getElementById("entry").style.display = "none";
    document.getElementById("main").classList.remove("hidden");
}
</script>

</body>
</html>
